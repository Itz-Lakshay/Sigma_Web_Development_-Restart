<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

                <td>Lakshay</td>

            <tr>
                <td colspan="2">Sam</td>

            </tr>

            <tr>
                <td colspan="2">Karan</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">Sam</td>
                <td rowspan="2">foot</td>
            </tr>

    </table>

    <ul type="square">
        <li>Lakshay</li>
        <li>Harry</li>
        <li>Rohan</li>
    </ul>

    <ol type="A">
        <li>Lakshay</li>
        <li>Harry</li>
        <li>Rohan</li>
    </ol>

</html>
