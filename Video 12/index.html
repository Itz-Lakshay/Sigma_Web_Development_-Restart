<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- You are given 12 files - 6 audio and 6 video.
    Design a website using html only which shows these 12 files.
    1.mp3, 2.mp3,....,6.mp3
    1.mp4, 2.mp4,....,6.mp4 -->

    <header>
        <h1>HTML Media Website</h1>
    </header>

    <main>
        <h2>6 Audio Files</h2>
        <div>
            <p>Audio 1</p>
            <audio src="1.mp3" controls></audio>
            <p>Audio 2</p>
            <audio src="2.mp3" controls></audio>
            <p>Audio 3</p>
            <audio src="3.mp3" controls></audio>
            <p>Audio 4</p>
            <audio src="4.mp3" controls></audio>
            <p>Audio 5</p>
            <audio src="5.mp3" controls></audio>
            <p>Audio 6</p>
            <audio src="6.mp3" controls></audio>
        </div>

        <h2>6 Video Files</h2>
        <div>
            <p>Video 1</p>
            <video src="1.mp4" controls width="500"></video>
            <p>Video 2</p>
            <video src="2.mp4" controls width="500"></video>
            <p>Video 3</p>
            <video src="3.mp4" controls width="500"></video>
            <p>Video 4</p>
            <video src="4.mp4" controls width="500"></video>
            <p>Video 5</p>
            <video src="5.mp4" controls width="500"></video>
            <p>Video 6</p>
            <video src="6.mp4" controls width="500"></video>
        </div>
    </main>

    <footer>
        <p>Copyright Lakshay || All Rights Reserved</p>
    </footer>
</body>
</html>
