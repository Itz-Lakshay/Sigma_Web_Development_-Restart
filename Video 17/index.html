<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        /* div{
            background-color: red;
        } */

        /* Class Selector */
        .red{
            background-color: red;
        }

        /* Id Selector */
        #green{
            background-color: green;
        }

        /* Child Selector(direct child) */
        div > p{
            color: blue;
            background-color: brown;
        }

        /* Descendent Selector(works even if not direct child) */
        div p{
            color: blue;
            background-color: brown;
        }

        /* Universal Selector */
        *{
            padding: 0;
            margin: 0;
        }

        /* Pseudo Selector */
        a:visited{
            color: yellow;
        }

        a:link{
            color: green;
        }

        a:active{
            background-color: red;
        }

        a:hover{
            background-color: yellow;
        }

        p:first-child{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="red">
        I am a div
        <p>I am a para inside div</p>
        <article>
            <p>I am grandchild of div</p>
        </article>
    </div>

    <div id="green">
        I am another div
    </div>

    <a href="https://www.google.com">Go to Google</a>
    <a href="https://www.facebook.com">Go to Facebook</a>

    <main class="one">
        <p>I am first</p>
        <p>I am second</p>
    </main>
</body>
</html>
